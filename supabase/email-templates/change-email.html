<!--
  Supabase → Authentication → Emails → Change email address
  Konu: Patron Beni Kap — Yeni e-posta adresini onayla
-->
<!DOCTYPE html>
<html lang="tr">
  <body style="margin:0;padding:0;background:#f4f6f5;font-family:Arial,Helvetica,sans-serif;color:#1a1a1a;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6f5;padding:32px 16px;">
      <tr>
        <td align="center">
          <table width="100%" style="max-width:520px;background:#ffffff;border-radius:16px;padding:32px 28px;border:1px solid #e5ebe8;">
            <tr>
              <td>
                <p style="margin:0 0 8px;font-size:13px;color:#5f6f66;">Patron Beni Kap</p>
                <h1 style="margin:0 0 16px;font-size:22px;line-height:1.3;color:#0f3d2e;">
                  Yeni e-posta adresini onayla
                </h1>
                <p style="margin:0 0 20px;font-size:15px;line-height:1.6;color:#334038;">
                  Hesabının e-posta adresini
                  <strong>{{ .NewEmail }}</strong>
                  olarak güncellemek için aşağıdaki butona tıkla.
                </p>
                <p style="margin:0 0 24px;">
                  <a
                    href="{{ .ConfirmationURL }}"
                    style="display:inline-block;background:#1f7a4d;color:#ffffff;text-decoration:none;padding:12px 22px;border-radius:10px;font-size:15px;font-weight:bold;"
                  >
                    Yeni e-postayı onayla
                  </a>
                </p>
                <p style="margin:0;font-size:13px;line-height:1.5;color:#6b7a72;">
                  Bu isteği sen yapmadıysan bu e-postayı yok sayabilirsin.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
